services:
  hydra:
    image: oryd/hydra:v2.2.0
    command: serve all --dev
    environment:
      - DSN=memory
      - SECRETS_SYSTEM=insecure-e2e-system-secret-000000
      - STRATEGIES_ACCESS_TOKEN=jwt
      - URLS_SELF_ISSUER=http://hydra:4444
    ports:
      - "4444:4444"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:4444/health/ready" ]
      interval: 1s
      timeout: 2s
      retries: 30

  hydra-provision:
    image: oryd/hydra:v2.2.0
    depends_on:
      hydra:
        condition: service_healthy
    restart: "no"
    entrypoint: [ "/bin/sh", "/provision.sh" ]
    volumes:
      - ./provision.sh:/provision.sh:ro

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SOURCEMETA_ONE_SANDBOX_EDITION: ${EDITION}
    environment:
      - SOURCEMETA_ONE_PORT=8001
    env_file:
      - environment
    depends_on:
      hydra:
        condition: service_healthy
      hydra-provision:
        condition: service_completed_successfully
    ports:
      - "${PORT}:8001"
